<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <header class="w-[1600px] mx-auto py-4  border-b-1 border-gray-100 ">
        <div class="w-[90%] mx-auto flex justify-between text-center items-center ">
            <div class="flex text-center items-center">
                <img class="w-9" src="./assets/github-logo.png" alt="">
                <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
            </div>
            <div class="gap-4">
                <input type="text" id="search-issue" placeholder="Search-issues..."
                    class="input input-bordered w-24 md:w-auto" />
                <button id="btn-search" class="btn bg-primary text-white">Search</button>
                <button class="btn bg-primary text-white"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
    </header>

    <section class="w-[1600px] mx-auto">
        <div class="w-[70%] mx-auto rounded-lg shadow-sm mt-15 p-6">
            <button id="all-btn" onclick="switchBtn('all')"
                class="btn w-[120px] bg-transparent text-[#64748B]">All</button>
            <button id="open-btn" onclick="switchBtn('open')"
                class="btn w-[120px] bg-transparent text-[#64748B]">Open</button>
            <button id="closed-btn" onclick="switchBtn('closed')"
                class="btn w-[120px] bg-transparent text-[#64748B]">Closed</button>
        </div>
    </section>

    <section class="w-[1600px] mx-auto">
        <div class="w-[70%] mx-auto rounded-lg shadow-sm">
            <div class=" mt-15 p-6 flex justify-between items-center">
                <div class="flex gap-2">
                    <img class="p-3 bg-purple-300 rounded-full" src="./assets/Aperture.png" alt="">
                    <div>
                        <h3 class="font-semibold text-xl"> <span id="total-issues">0</span> Issues</h3>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-circle text-green-500"></i>
                        <h3 class="font-medium">Open</h3>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-circle text-purple-500"></i>
                        <h3 class="font-medium">Closed</h3>
                    </div>
                </div>

            </div>
            <hr class="text-gray-300">

            <div id="loading-spinner" class="flex justify-center items-center py-10">
                <span class="loading loading-infinity loading-xl"></span>
            </div>

            <!-- Cards -->
            <div id="issue-container" class="p-6 grid grid-cols-4 gap-3 bg-[#FBFBFB]">

            </div>
            <div id="open-issue-container" class="p-6 grid grid-cols-4 gap-3 bg-[#FBFBFB]">

            </div>
            <div id="closed-issue-container" class="p-6 grid grid-cols-4 gap-3 bg-[#FBFBFB]">

            </div>

        </div>


    </section>


    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="modal-container">
                
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn bg-primary text-white">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="./script/index.js"></script>

</body>

</html>
